<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат-бот Техніки</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .chat-container { width: 100%; max-width: 400px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .messages { height: 450px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
  .message { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
  .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
  .bot { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
  form { display: flex; border-top: 1px solid #eee; padding: 10px; }
  input { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; }
  button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
  button:hover { background: #0056b3; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="messages" id="messages"></div>
  <form id="chat-form">
    <input type="text" id="input" placeholder="Запитайте про ноутбуки, SSD або доставку..." autocomplete="off" />
    <button type="submit">OK</button>
  </form>
</div>

<script>
const form = document.getElementById('chat-form');
const input = document.getElementById('input');
const messages = document.getElementById('messages');


const API_URL = 'https://chat-bot1-wcr0.onrender.com';

function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

form.onsubmit = async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });

        if (!res.ok) throw new Error('Помилка сервера');

        const data = await res.json();
        addMessage(data.response, 'bot');
    } catch (error) {
        addMessage("Помилка: не вдалося з'єднатися з сервером. Перевірте API_URL.", 'bot');
    }
};
</script>
</body>
</html>
